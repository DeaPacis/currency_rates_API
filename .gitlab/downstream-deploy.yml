# Target pipeline configuration
spec:
  inputs:
    environment:
      description: "Deployment environment"
      options: ["staging", "production"]
      default: "production"
    image-tag:
      type: string
      description: "Application version"
      default: "stable"
    container-name:
      type: string
      description: "Container name"
      default: "app"
    app-port:
      type: string
      description: "Application port"
      default: "8000"
---

variables:
  IMAGE_TAG: $[[ inputs.image-tag ]]
  ENVIRONMENT: $[[ inputs.environment ]]
  APP_PORT: $[[ inputs.app-port ]]
  CONTAINER_NAME: "$[[ inputs.container-name ]]-$[[ inputs.environment ]]"

stages:
  - deploy

deploy:
  stage: deploy
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - docker pull $IMAGE_TAG
  script:
    - |
      docker stop $CONTAINER_NAME || true
      docker rm $CONTAINER_NAME || true
      docker run -d --name $CONTAINER_NAME --restart unless-stopped -p $APP_PORT:$APP_PORT $IMAGE_TAG
    - docker ps | grep $CONTAINER_NAME
    - |
      echo "Waiting for container to be ready..."
      for i in $(seq 1 30); do
        curl -f http://localhost:$APP_PORT/info && break || sleep 2;
      done
    - curl -f -L http://localhost:$APP_PORT/info || exit 1
  tags:
    - $[[ inputs.environment ]]
