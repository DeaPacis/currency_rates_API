spec:
  inputs:
    environment:
      description: "Deployment environment"
      options: ["staging", "production"]
      default: "production"
    image-tag:
      type: string
      description: "Full image tag (registry/repo:tag)"
      default: "apochebut03/currency-app:latest"
    commit-message:
      type: string
      description: "Commit message"
      default: "Update image"

---
variables:
  IMAGE_TAG: $[[ inputs.image-tag ]]
  ENV: $[[ inputs.environment ]]
  COMMIT_MSG: "$[[ inputs.commit-message ]]"

stages:
  - update-git

update-manifests:
  stage: update-git
  image: alpine/git:latest
  before_script:
    - apk add --no-cache sed
  script:
    - git clone https://oauth2:$MANIFEST_REPO_TOKEN@education-git.yadro.com/education/devops/2026/a.pochebut/infra.git infra
    - cd infra/k8s_manifests/base
    
    - git config user.email "gitlab-ci@yadro.com"
    - git config user.name "GitLab CI"

    - "sed -i \"s|image: apochebut03/currency-app:.*|image: $IMAGE_TAG|\" deployment.yaml"
    
    - git diff --quiet || (git add deployment.yaml && git commit -m "$COMMIT_MSG" && git push origin main)
  only:
    - main
  variables:
    MANIFEST_REPO_TOKEN: $MANIFEST_REPO_TOKEN
