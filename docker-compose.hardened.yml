services:
  currency-api:
    build: .
    container_name: currency-api
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file:
      - .env
    restart: unless-stopped

    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    user: "1000:1000"
    tmpfs:
      - /tmp
    pids_limit: 100
    mem_limit: 256m

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT}/info"]
      interval: 30s
      timeout: 5s
      retries: 3